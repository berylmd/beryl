# Turbo remote caching via rharkor/caching-for-turbo (free, backed by GitHub Actions cache)
# No secrets required.

name: Build Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm dlx playwright install chromium --with-deps

      - name: Cache turbo build setup
        uses: rharkor/caching-for-turbo@v1.8

      - name: Run tests
        run: pnpm run test

  build:
    needs: [test]
    strategy:
      matrix:
        os: ${{ startsWith(github.ref, 'refs/tags/') && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version from git tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\///' | sed 's/^v//')
          echo "Injecting version: $VERSION into apps/desktop/package.json"
          cd apps/desktop
          jq --arg version "$VERSION" '.version = $version' package.json > package.json.tmp && mv package.json.tmp package.json
          cat package.json | jq '.version'

      - name: Cache turbo build setup
        uses: rharkor/caching-for-turbo@v1.8

      - name: Build with Turbo
        run: pnpm turbo run build --filter=desktop

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/desktop/out/make
          if-no-files-found: error

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/desktop-ubuntu-latest/**/*
            artifacts/desktop-macos-latest/**/*
            artifacts/desktop-windows-latest/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
